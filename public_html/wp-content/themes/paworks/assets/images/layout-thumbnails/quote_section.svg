<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="white"/>
  <!-- Large quotation marks -->
  <text x="70" y="65" font-family="Georgia, serif" font-size="60" fill="#407ec9" opacity="0.4">"</text>
  <text x="210" y="145" font-family="Georgia, serif" font-size="60" fill="#407ec9" opacity="0.4">"</text>
  <!-- Centered text lines -->
  <rect x="60" y="80" width="180" height="6" rx="2" fill="#9CA3AF"/>
  <rect x="75" y="94" width="150" height="6" rx="2" fill="#9CA3AF"/>
  <rect x="90" y="108" width="120" height="6" rx="2" fill="#9CA3AF"/>
  <!-- Attribution -->
  <rect x="110" y="140" width="80" height="5" rx="2" fill="#252b5d"/>
  <rect x="120" y="152" width="60" height="4" rx="2" fill="#9CA3AF"/>
</svg>
