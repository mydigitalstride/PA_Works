<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="white"/>
  <!-- Card 1 -->
  <rect x="10" y="20" width="130" height="160" rx="6" fill="#E5E7EB"/>
  <!-- Card 1 text lines left -->
  <rect x="20" y="35" width="50" height="6" rx="2" fill="#252b5d"/>
  <rect x="20" y="48" width="55" height="4" rx="2" fill="#9CA3AF"/>
  <rect x="20" y="57" width="45" height="4" rx="2" fill="#9CA3AF"/>
  <rect x="20" y="66" width="50" height="4" rx="2" fill="#9CA3AF"/>
  <!-- Card 1 image placeholder right -->
  <rect x="82" y="30" width="48" height="50" rx="3" fill="#9CA3AF" opacity="0.4"/>
  <line x1="82" y1="30" x2="130" y2="80" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="130" y1="30" x2="82" y2="80" stroke="#9CA3AF" stroke-width="0.5"/>
  <!-- Card 1 bottom content -->
  <rect x="20" y="90" width="110" height="4" rx="2" fill="#9CA3AF"/>
  <rect x="20" y="100" width="100" height="4" rx="2" fill="#9CA3AF"/>
  <rect x="20" y="115" width="50" height="14" rx="3" fill="#407ec9"/>

  <!-- Card 2 -->
  <rect x="160" y="20" width="130" height="160" rx="6" fill="#E5E7EB"/>
  <!-- Card 2 text lines left -->
  <rect x="170" y="35" width="50" height="6" rx="2" fill="#252b5d"/>
  <rect x="170" y="48" width="55" height="4" rx="2" fill="#9CA3AF"/>
  <rect x="170" y="57" width="45" height="4" rx="2" fill="#9CA3AF"/>
  <rect x="170" y="66" width="50" height="4" rx="2" fill="#9CA3AF"/>
  <!-- Card 2 image placeholder right -->
  <rect x="232" y="30" width="48" height="50" rx="3" fill="#9CA3AF" opacity="0.4"/>
  <line x1="232" y1="30" x2="280" y2="80" stroke="#9CA3AF" stroke-width="0.5"/>
  <line x1="280" y1="30" x2="232" y2="80" stroke="#9CA3AF" stroke-width="0.5"/>
  <!-- Card 2 bottom content -->
  <rect x="170" y="90" width="110" height="4" rx="2" fill="#9CA3AF"/>
  <rect x="170" y="100" width="100" height="4" rx="2" fill="#9CA3AF"/>
  <rect x="170" y="115" width="50" height="14" rx="3" fill="#407ec9"/>
</svg>